name: Refresh top Sui wallets

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-top-wallets
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run fetch-top-wallets
        run: node scripts/fetch-top-wallets.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/top-sui-wallets.generated.json
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore: refresh top-sui-wallets [skip ci]"
          git push
